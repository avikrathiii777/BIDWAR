<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction – Players</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c12;
    --surface: #12151e;
    --surface2: #1a1f2e;
    --border: #2a3044;
    --accent: #f0b429;
    --accent2: #e05c2a;
    --red: #ef4444;
    --text: #e8ecf4;
    --muted: #7a839a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(240,180,41,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(224,92,42,0.06) 0%, transparent 50%);
  }
  .header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1;
  }
  .step-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 16px;
    font-size: 13px; color: var(--muted); margin-top: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .step-badge span {
    width: 20px; height: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #000;
  }
  .steps-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
  .step-dot { width: 32px; height: 4px; border-radius: 2px; background: var(--border); }
  .step-dot.active { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  input[type="text"] {
    width: 100%; padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,180,41,0.12); }
  input::placeholder { color: var(--muted); }
  button {
    width: 100%; padding: 14px 20px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .btn-add {
    background: var(--surface2); color: var(--accent);
    border: 1px dashed rgba(240,180,41,0.4);
    margin-bottom: 0; font-size: 14px; padding: 12px;
  }
  .btn-add:hover { border-color: var(--accent); background: rgba(240,180,41,0.06); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,180,41,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .player-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    animation: fadeIn 0.2s ease;
  }
  .player-num {
    width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted); font-weight: 600; flex-shrink: 0;
  }
  .player-row input { margin: 0; flex: 1; }
  .btn-remove {
    width: 32px; height: 32px; flex-shrink: 0; padding: 0;
    background: transparent; border: 1px solid var(--border);
    border-radius: 50%; color: var(--muted); font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }
  .player-count {
    font-size: 12px; color: var(--muted); text-align: center;
    margin-bottom: 10px; letter-spacing: 0.5px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ BidWar</div>
  <div class="step-badge"><span>1</span> Players Setup</div>
</div>

<div class="steps-row">
  <div class="step-dot active"></div>
  <div class="step-dot"></div>
  <div class="step-dot"></div>
  <div class="step-dot"></div>
</div>

<div class="card" id="playersCard">
  <div class="player-count" id="playerCount">0 players added</div>
  <div id="playerInputs"></div>
  <button class="btn-add" id="btnAddPlayer">+ Add Player</button>
</div>

<button class="btn-primary" id="btnNext">Continue to Teams →</button>

<script src="auctionpage1.js"></script>
</body>
</html>
